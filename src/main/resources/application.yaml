server:
  port: 8082

spring:
  application:
    name: slo-checker

  config:
    import:
      - classpath:rules.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

slo:
  check-interval: 10s

  prometheus:
    url: http://localhost:9090